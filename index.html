<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精密・多重視界再現</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .container { position: relative; flex: 1; background: black; overflow: hidden; border-bottom: 2px solid #444; }
        
        video { position: absolute; top: 50%; left: 50%; transform-origin: center; }
        /* 濃くするために opacity を高めに設定 */
        .extra-video { pointer-events: none; mix-blend-mode: screen; }

        .controls { 
            padding: 10px; background: #2a2a2a; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; 
            font-size: 11px; max-height: 45vh; overflow-y: auto;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; padding: 6px; background: #333; border-radius: 5px; }
        input[type="range"] { width: 95%; margin-top: 4px; }
        span { font-weight: bold; color: #ffeb3b; }
        .hint { font-size: 9px; color: #bbb; margin-top: 2px; }
    </style>
</head>
<body>

<div class="container">
    <video id="v0" autoplay playsinline></video>
    <video id="v1" class="extra-video" autoplay playsinline></video>
    <video id="v2" class="extra-video" autoplay playsinline></video>
    <video id="v3" class="extra-video" autoplay playsinline></video>
</div>

<div class="controls">
    <div class="control-group">
        <span>距離感調整 (画角)</span>
        <input type="range" id="scale-range" min="0.8" max="4.0" step="0.05" value="1.5">
        <div class="hint">実物のサイズと重なるまで調整</div>
    </div>
    <div class="control-group">
        <span>多重の濃さ</span>
        <input type="range" id="opacity-range" min="0.1" max="0.9" step="0.1" value="0.6">
    </div>
    <div class="control-group">
        <span>多重度 (1〜4枚)</span>
        <input type="range" id="count-range" min="1" max="4" value="1">
    </div>
    <div class="control-group">
        <span>近視 (ぼかし)</span>
        <input type="range" id="blur-range" min="0" max="50" value="0">
    </div>
    <div class="control-group">
        <span>ズレ幅 (距離)</span>
        <input type="range" id="dist-range" min="0" max="100" value="0">
    </div>
    <div class="control-group">
        <span>回転角度</span>
        <input type="range" id="angle-range" min="0" max="360" value="0">
    </div>
</div>

<script>
    const videos = [document.getElementById('v0'), document.getElementById('v1'), document.getElementById('v2'), document.getElementById('v3')];
    const r = {
        count: document.getElementById('count-range'),
        scale: document.getElementById('scale-range'),
        blur: document.getElementById('blur-range'),
        dist: document.getElementById('dist-range'),
        angle: document.getElementById('angle-range'),
        opacity: document.getElementById('opacity-range')
    };

    async function setupCamera() {
        // 最高画質をリクエストして歪みを減らす
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 3840 }, height: { ideal: 2160 }, facingMode: "environment" }
        });
        videos.forEach(v => v.srcObject = stream);
    }

    function update() {
        const count = parseInt(r.count.value);
        const s = r.scale.value;
        const b = r.blur.value;
        const d = r.dist.value;
        const a = parseInt(r.angle.value);
        const op = r.opacity.value;

        const filter = `blur(${b}px) brightness(1.0)`;

        videos.forEach((v, i) => {
            if (i >= count) {
                v.style.display = "none";
                return;
            }
            v.style.display = "block";
            v.style.filter = filter;

            if (i === 0) {
                v.style.opacity = "1";
                v.style.transform = `translate(-50%, -50%) scale(${s})`;
            } else {
                // 重なりを「濃く」設定
                v.style.opacity = op;
                const offsetAngle = (360 / (count > 1 ? count : 1)) * i + a;
                const rad = offsetAngle * Math.PI / 180;
                const x = Math.cos(rad) * d;
                const y = Math.sin(rad) * d;
                v.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${s})`;
            }
        });
    }

    Object.values(r).forEach(input => input.addEventListener('input', update));
    setupCamera();
</script>

</body>
</html>
