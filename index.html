<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視界再現シミュレーター V3</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 表示エリア：ここからはみ出さないように設定 */
        .container { position: relative; flex: 1; background: black; overflow: hidden; }
        
        video { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            /* 初期状態は中央配置。JSで transform を上書き */
            transform: translate(-50%, -50%);
            width: 100%; 
            height: 100%;
            object-fit: contain; /* ズームを防ぐために contain に変更 */
        }
        
        .extra-video { pointer-events: none; mix-blend-mode: screen; display: none; }

        .controls { 
            padding: 10px; background: #2a2a2a; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            font-size: 11px; max-height: 40vh; overflow-y: auto;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; padding: 8px; background: #333; border-radius: 8px; }
        input[type="range"] { width: 90%; margin-top: 5px; }
        span { font-weight: bold; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="container" id="stage">
    <video id="v0" autoplay playsinline></video>
    <video id="v1" class="extra-video" autoplay playsinline></video>
    <video id="v2" class="extra-video" autoplay playsinline></video>
    <video id="v3" class="extra-video" autoplay playsinline></video>
</div>

<div class="controls">
    <div class="control-group">
        <span>サイズ(距離感)</span>
        <input type="range" id="scale-range" min="0.5" max="3.0" step="0.01" value="1.0">
    </div>
    <div class="control-group">
        <span>多重の濃さ</span>
        <input type="range" id="opacity-range" min="0.1" max="1.0" step="0.1" value="0.7">
    </div>
    <div class="control-group">
        <span>多重度 (枚数)</span>
        <input type="range" id="count-range" min="1" max="4" value="1">
    </div>
    <div class="control-group">
        <span>近視 (ぼかし)</span>
        <input type="range" id="blur-range" min="0" max="40" value="0">
    </div>
    <div class="control-group">
        <span>ズレ幅 (距離)</span>
        <input type="range" id="dist-range" min="0" max="150" value="0">
    </div>
    <div class="control-group">
        <span>角度回転</span>
        <input type="range" id="angle-range" min="0" max="360" value="0">
    </div>
</div>

<script>
    const videos = [document.getElementById('v0'), document.getElementById('v1'), document.getElementById('v2'), document.getElementById('v3')];
    const r = {
        count: document.getElementById('count-range'),
        scale: document.getElementById('scale-range'),
        blur: document.getElementById('blur-range'),
        dist: document.getElementById('dist-range'),
        angle: document.getElementById('angle-range'),
        opacity: document.getElementById('opacity-range')
    };

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: "environment" }
            });
            videos.forEach(v => v.srcObject = stream);
        } catch (err) {
            console.error(err);
        }
    }

    function update() {
        const count = parseInt(r.count.value);
        const s = r.scale.value;
        const b = r.blur.value;
        const d = r.dist.value;
        const a = parseInt(r.angle.value);
        const op = r.opacity.value;

        const filter = `blur(${b}px)`;

        videos.forEach((v, i) => {
            if (i >= count) {
                v.style.display = "none";
                return;
            }
            v.style.display = "block";
            v.style.filter = filter;

            if (i === 0) {
                v.style.opacity = "1";
                // 中央固定(-50%)しつつ、scaleを適用
                v.style.transform = `translate(-50%, -50%) scale(${s})`;
            } else {
                v.style.opacity = op;
                // 分散角度の計算
                const offsetAngle = (360 / (count > 1 ? count : 1)) * i + a;
                const rad = offsetAngle * Math.PI / 180;
                // ズレ幅dをピクセルとして適用
                const x = Math.cos(rad) * d;
                const y = Math.sin(rad) * d;
                // 元のセンター配置(-50%)を維持しながら移動と拡大を組み合わせる
                v.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${s})`;
            }
        });
    }

    Object.values(r).forEach(input => input.addEventListener('input', update));
    setupCamera();
    // 最初の描画を少し遅らせて安定させる
    setTimeout(update, 500);
</script>

</body>
</html>
