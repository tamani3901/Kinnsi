<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高画質・視界シミュレーター</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .container { position: relative; flex: 1; background: black; overflow: hidden; }
        
        /* 映像レイヤー */
        video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); min-width: 100%; min-height: 100%; object-fit: cover; }
        #video-sub { opacity: 0; pointer-events: none; mix-blend-mode: screen; } /* 乱視の重なりをよりリアルに */

        .controls { padding: 15px; background: #333; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        input[type="range"] { width: 80%; margin-top: 5px; }
        span { margin-bottom: 2px; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="container">
    <video id="video-main" autoplay playsinline></video>
    <video id="video-sub" autoplay playsinline></video>
</div>

<div class="controls">
    <div class="control-group">
        <span>近視 (ぼかし)</span>
        <input type="range" id="blur-range" min="0" max="30" value="0">
    </div>
    <div class="control-group">
        <span>乱視 (二重幅)</span>
        <input type="range" id="double-range" min="0" max="50" value="0">
    </div>
    <div class="control-group">
        <span>明るさ (露出)</span>
        <input type="range" id="bright-range" min="0.2" max="2" step="0.1" value="1">
    </div>
    <div class="control-group">
        <span>くっきり感 (コントラスト)</span>
        <input type="range" id="contrast-range" min="0.5" max="2" step="0.1" value="1">
    </div>
</div>

<script>
    const videoMain = document.getElementById('video-main');
    const videoSub = document.getElementById('video-sub');
    const blurRange = document.getElementById('blur-range');
    const doubleRange = document.getElementById('double-range');
    const brightRange = document.getElementById('bright-range');
    const contrastRange = document.getElementById('contrast-range');

    async function setupCamera() {
        // 高画質（HD）をリクエスト
        const constraints = {
            video: {
                width: { ideal: 1920 },
                height: { ideal: 1080 },
                facingMode: "environment"
            },
            audio: false
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            videoMain.srcObject = stream;
            videoSub.srcObject = stream;
        } catch (err) {
            alert("カメラの設定に失敗しました。解像度が対応していない可能性があります。");
        }
    }

    function updateFilters() {
        const b = blurRange.value;
        const d = doubleRange.value;
        const br = brightRange.value;
        const ct = contrastRange.value;

        const filterString = `blur(${b}px) brightness(${br}) contrast(${ct})`;
        
        videoMain.style.filter = filterString;
        
        if (d > 0) {
            videoSub.style.opacity = "0.5";
            videoSub.style.filter = filterString;
            // 乱視っぽく斜めに少しずらす設定
            videoSub.style.transform = `translate(calc(-50% + ${d}px), calc(-50% + ${d/2}px)) scale(1.02)`;
        } else {
            videoSub.style.opacity = "0";
        }
    }

    [blurRange, doubleRange, brightRange, contrastRange].forEach(el => {
        el.addEventListener('input', updateFilters);
    });

    setupCamera();
</script>

</body>
</html>
